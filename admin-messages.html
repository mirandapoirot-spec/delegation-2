<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie Admin | Délégation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: calc(100vh - 4rem);
            margin: 2rem;
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .chat-sidebar {
            background: rgba(15, 23, 42, 0.4);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .chat-user-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-user-item {
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-user-item:hover,
        .chat-user-item.active {
            background: rgba(56, 189, 248, 0.1);
        }

        .chat-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .chat-messages-area {
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.2);
        }

        .chat-header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .messages-list {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 70%;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            position: relative;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .message.admin {
            align-self: flex-end;
            background: var(--accent-primary);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.client {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            background: var(--bg-card);
            display: flex;
            gap: 1rem;
        }

        .chat-input {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 0.8rem 1.5rem;
            color: white;
            outline: none;
        }

        .send-btn {
            background: var(--accent-primary);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        .unread-badge {
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: auto;
        }
    </style>
    <link rel="stylesheet" href="assets/css/spacing-fix.css">
</head>

<body>

    <div class="dashboard-container" style="grid-template-columns: 80px 1fr;">
        <!-- Collapsed Sidebar for more space -->
        <aside class="sidebar reveal-left" style="width: 80px; align-items: center; padding: 1rem 0;">
            <a href="index.html" class="nav-logo" style="margin-bottom: 2rem;">
                <i class="fa-solid fa-layer-group" style="font-size: 1.5rem;"></i>
            </a>
            <nav style="display: flex; flex-direction: column; gap: 1.5rem; width: 100%; align-items: center;">
                <a href="admin-dashboard.html" title="Dashboard"><i class="fa-solid fa-chart-line"
                        style="font-size: 1.2rem; color: var(--text-muted);"></i></a>
                <a href="users-management.html" title="Utilisateurs"><i class="fa-solid fa-users"
                        style="font-size: 1.2rem; color: var(--text-muted);"></i></a>
                <a href="projects-admin.html" title="Projets"><i class="fa-solid fa-briefcase"
                        style="font-size: 1.2rem; color: var(--text-muted);"></i></a>
                <a href="admin-messages.html" title="Messages" style="color: var(--accent-primary);"><i
                        class="fa-solid fa-comments" style="font-size: 1.2rem;"></i></a>
            </nav>
            <div style="flex: 1;"></div>
            <a href="login.html" title="Déconnexion"><i class="fa-solid fa-right-from-bracket"
                    style="font-size: 1.2rem; color: #ef4444;"></i></a>
        </aside>

        <main class="chat-main">
            <div class="chat-container reveal">
                <!-- User List -->
                <div class="chat-sidebar">
                    <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color);">
                        <h3 style="font-size: 1.1rem;">Discussions</h3>
                        <input type="text" placeholder="Rechercher..."
                            style="width: 100%; margin-top: 10px; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.05); color: white;">
                    </div>
                    <div class="chat-user-list" id="userList">
                        <!-- Populated by JS -->
                        <div style="padding: 2rem; text-align: center; color: var(--text-muted);">Chargement...</div>
                    </div>
                </div>

                <!-- Chat Area -->
                <div class="chat-messages-area">
                    <div class="chat-header" id="chatHeader">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div class="chat-user-avatar" id="currentChatAvatar">?</div>
                            <div>
                                <h3 id="currentChatName">Sélectionnez une discussion</h3>
                                <span style="font-size: 0.8rem; color: var(--text-muted);" id="currentChatEmail"></span>
                            </div>
                        </div>
                    </div>

                    <div class="messages-list" id="messagesList">
                        <!-- Messages go here -->
                        <div style="text-align: center; margin-top: 20%; color: var(--text-muted);">
                            <i class="fa-regular fa-comments"
                                style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                            <p>Choisissez un utilisateur à gauche pour commencer à discuter.</p>
                        </div>
                    </div>

                    <div class="chat-input-area">
                        <input type="text" id="messageInput" class="chat-input" placeholder="Écrivez votre réponse..."
                            disabled>
                        <button id="sendMessageBtn" class="send-btn" disabled>
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/chat-system.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'super_admin')) {
                window.location.href = 'login.html';
                return;
            }

            // Ensure ChatSystem is available
            if (!window.ChatSystem) {
                console.error("ChatSystem not found!");
                alert("Erreur de chargement du système de chat.");
                return;
            }

            const userListEl = document.getElementById('userList');
            const messagesListEl = document.getElementById('messagesList');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendMessageBtn');
            const chatHeader = document.getElementById('chatHeader');

            let activeChatUser = null;

            // Load Conversations
            function loadConversations() {
                // Use window.ChatSystem explicitly
                const conversations = window.ChatSystem.getConversationsList();

                if (conversations.length === 0) {
                    userListEl.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-muted);">Aucune discussion en cours.</div>';
                    return;
                }

                userListEl.innerHTML = conversations.map(c => `
                    <div class="chat-user-item ${activeChatUser === c.email ? 'active' : ''}" onclick="selectUser('${c.email}', '${c.name}')">
                        <div class="chat-user-avatar" style="${c.avatar ? `background: url(${c.avatar}) center/cover` : ''}">
                            ${!c.avatar ? c.name.charAt(0).toUpperCase() : ''}
                        </div>
                        <div style="flex: 1; overflow: hidden;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${c.name}</span>
                                ${c.unread > 0 ? `<span class="unread-badge">${c.unread}</span>` : ''}
                            </div>
                            <div style="font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${c.lastMessage || 'Nouvelle discussion'}</div>
                        </div>
                    </div>
                `).join('');
            }

            // Select User
            window.selectUser = (email, name) => {
                activeChatUser = email;

                // Update UI Header
                document.getElementById('currentChatName').innerText = name;
                document.getElementById('currentChatEmail').innerText = email;
                document.getElementById('currentChatAvatar').innerText = name.charAt(0).toUpperCase(); // simplified avatar logic

                // Enable Input
                messageInput.disabled = false;
                sendBtn.disabled = false;

                // Mark as read
                window.ChatSystem.markAsRead(email, 'admin');

                // Refresh list to clear badge
                loadConversations();

                // Load messages
                loadMessages(email);
            };

            // Load Messages
            function loadMessages(email) {
                const messages = window.ChatSystem.getConversation(email);

                if (messages.length === 0) {
                    messagesListEl.innerHTML = '<div style="text-align: center; margin-top: 2rem; color: var(--text-muted);">Aucun message. Dites bonjour !</div>';
                } else {
                    messagesListEl.innerHTML = messages.map(msg => `
                        <div class="message ${msg.sender === 'admin' ? 'admin' : 'client'}">
                            ${msg.text}
                            <div style="font-size: 0.65rem; opacity: 0.7; margin-top: 4px; text-align: right;">
                                ${new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                            </div>
                        </div>
                    `).join('');
                }

                // Scroll to bottom
                messagesListEl.scrollTop = messagesListEl.scrollHeight;
            }

            // Send Message
            function sendMessage() {
                const text = messageInput.value.trim();
                if (!text || !activeChatUser) return;

                window.ChatSystem.sendMessage('admin', activeChatUser, text);
                messageInput.value = '';

                // Refresh View
                loadMessages(activeChatUser);
                loadConversations(); // Update snippet side
            }

            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // Poll for new messages every 3 seconds
            setInterval(() => {
                if (activeChatUser) loadMessages(activeChatUser); // Refresh current chat
                loadConversations(); // Refresh badges
            }, 3000);

            // Initial Load
            loadConversations();
        });
    </script>
</body>

</html>
