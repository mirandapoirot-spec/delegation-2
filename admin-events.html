<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Événements | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
            background: var(--bg-dark);
            background-image: var(--bg-gradient);
        }

        .sidebar {
            background: rgba(2, 6, 23, 0.4);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            padding: 2.5rem 1.5rem;
        }

        .main-content {
            padding: 3rem;
            overflow-y: auto;
        }

        .page-header {
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .events-grid {
            display: grid;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .event-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1.5rem;
            align-items: center;
            transition: all 0.3s;
        }

        .event-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .event-info {
            min-width: 0;
        }

        .event-info h3 {
            margin-bottom: 0.5rem;
            color: var(--text-main);
            word-wrap: break-word;
        }

        .event-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            word-wrap: break-word;
            margin-bottom: 0.5rem;
        }

        .event-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
            align-self: center;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .btn-edit {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-primary);
        }

        .btn-edit:hover {
            background: var(--accent-primary);
            color: white;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem 1.2rem;
            border-radius: 14px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .sidebar nav a:hover,
        .sidebar nav a.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-primary);
        }

        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .main-content {
                padding: 1.5rem;
            }

            .event-card {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .event-actions {
                justify-content: flex-end;
            }
        }
    </style>
    <link rel="stylesheet" href="assets/css/spacing-fix.css">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="admin-dashboard.html" class="nav-logo">
                <i class="fa-solid fa-layer-group"></i>
                MINJEC
            </a>

            <nav style="margin-top: 2rem;">
                <a href="admin-dashboard.html">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Tableau de bord</span>
                </a>
                <a href="users-management.html">
                    <i class="fa-solid fa-users"></i>
                    <span>Utilisateurs</span>
                </a>
                <a href="projects-admin.html">
                    <i class="fa-solid fa-folder"></i>
                    <span>Projets</span>
                </a>
                <a href="admin-events.html" class="active">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span>Événements</span>
                </a>
                <a href="data-management.html">
                    <i class="fa-solid fa-database"></i>
                    <span>Données</span>
                </a>
            </nav>

            <div style="margin-top: auto;">
                <a href="index.html" style="color: #ef4444;">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Déconnexion</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Gestion des Événements</h1>
                <p style="color: var(--text-muted);">Gérez les événements affichés sur la page d'accueil</p>
            </div>

            <button class="btn-primary" onclick="openAddModal()" style="margin-bottom: 2rem;">
                <i class="fa-solid fa-plus"></i> Ajouter un événement
            </button>

            <div class="events-grid" id="eventsGrid">
                <!-- Les événements seront chargés ici -->
            </div>
        </main>
    </div>

    <!-- Modal Ajouter/Modifier -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <h2 id="modalTitle">Ajouter un événement</h2>
            <form id="eventForm" onsubmit="saveEvent(event)">
                <input type="hidden" id="eventId">
                
                <div class="form-group">
                    <label>Titre de l'événement</label>
                    <input type="text" id="eventTitle" required>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="eventDate" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="eventDescription" required></textarea>
                </div>

                <div class="form-group">
                    <label>Lieu</label>
                    <input type="text" id="eventLocation" required>
                </div>

                <div class="form-group">
                    <label>Catégorie</label>
                    <select id="eventCategory" required>
                        <option value="formation">Formation</option>
                        <option value="conference">Conférence</option>
                        <option value="atelier">Atelier</option>
                        <option value="ceremonie">Cérémonie</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn-primary" style="flex: 1;">
                        <i class="fa-solid fa-save"></i> Enregistrer
                    </button>
                    <button type="button" class="btn-secondary" onclick="closeModal()" style="flex: 1;">
                        Annuler
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        // Charger les événements depuis localStorage
        function loadEvents() {
            const events = JSON.parse(localStorage.getItem('events') || '[]');
            const grid = document.getElementById('eventsGrid');
            
            if (events.length === 0) {
                grid.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 3rem;">Aucun événement pour le moment</p>';
                return;
            }

            grid.innerHTML = events.map(event => `
                <div class="event-card">
                    <div class="event-info">
                        <h3>${event.title}</h3>
                        <p><i class="fa-solid fa-calendar"></i> ${formatDate(event.date)} | <i class="fa-solid fa-location-dot"></i> ${event.location}</p>
                        <p>${event.description}</p>
                        <span style="display: inline-block; padding: 0.3rem 0.8rem; background: rgba(56, 189, 248, 0.1); color: var(--accent-primary); border-radius: 20px; font-size: 0.8rem; margin-top: 0.5rem;">${event.category}</span>
                    </div>
                    <div class="event-actions">
                        <button class="btn-icon btn-edit" onclick="editEvent('${event.id}')" title="Modifier">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="btn-icon btn-delete" onclick="deleteEvent('${event.id}')" title="Supprimer">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Ajouter un événement';
            document.getElementById('eventForm').reset();
            document.getElementById('eventId').value = '';
            document.getElementById('eventModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.remove('active');
        }

        function saveEvent(e) {
            e.preventDefault();
            
            const events = JSON.parse(localStorage.getItem('events') || '[]');
            const id = document.getElementById('eventId').value || Date.now().toString();
            
            const event = {
                id: id,
                title: document.getElementById('eventTitle').value,
                date: document.getElementById('eventDate').value,
                description: document.getElementById('eventDescription').value,
                location: document.getElementById('eventLocation').value,
                category: document.getElementById('eventCategory').value
            };

            const index = events.findIndex(e => e.id === id);
            if (index >= 0) {
                events[index] = event;
                showToast('Événement modifié avec succès', 'success');
            } else {
                events.push(event);
                showToast('Événement ajouté avec succès', 'success');
            }

            localStorage.setItem('events', JSON.stringify(events));
            closeModal();
            loadEvents();
        }

        function editEvent(id) {
            const events = JSON.parse(localStorage.getItem('events') || '[]');
            const event = events.find(e => e.id === id);
            
            if (event) {
                document.getElementById('modalTitle').textContent = 'Modifier l\'événement';
                document.getElementById('eventId').value = event.id;
                document.getElementById('eventTitle').value = event.title;
                document.getElementById('eventDate').value = event.date;
                document.getElementById('eventDescription').value = event.description;
                document.getElementById('eventLocation').value = event.location;
                document.getElementById('eventCategory').value = event.category;
                document.getElementById('eventModal').classList.add('active');
            }
        }

        function deleteEvent(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer cet événement ?')) {
                let events = JSON.parse(localStorage.getItem('events') || '[]');
                events = events.filter(e => e.id !== id);
                localStorage.setItem('events', JSON.stringify(events));
                showToast('Événement supprimé', 'success');
                loadEvents();
            }
        }

        // Fermer le modal en cliquant à l'extérieur
        document.getElementById('eventModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Charger les événements au démarrage
        loadEvents();
    </script>
</body>
</html>
