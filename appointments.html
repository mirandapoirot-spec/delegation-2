<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendez-vous | MINJEC Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: var(--bg-dark);
            background-image: var(--bg-gradient);
            min-height: 100vh;
        }

        .appointments-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            margin-top: 2rem;
        }

        .calendar-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .calendar-nav {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .calendar-nav button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s;
        }

        .calendar-nav button:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .calendar-month {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .weekday {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            padding: 0.5rem;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            font-weight: 500;
        }

        .calendar-day:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .calendar-day.other-month {
            color: var(--text-muted);
            opacity: 0.3;
        }

        .calendar-day.today {
            background: rgba(56, 189, 248, 0.2);
            border: 2px solid var(--accent-primary);
        }

        .calendar-day.selected {
            background: var(--accent-primary);
            color: white;
        }

        .calendar-day.has-appointment::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 6px;
            height: 6px;
            background: var(--accent-primary);
            border-radius: 50%;
        }

        .time-slots {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .time-slot {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .time-slot:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-primary);
        }

        .time-slot.selected {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(14, 165, 233, 0.2));
            border-color: var(--accent-primary);
        }

        .time-slot.booked {
            opacity: 0.4;
            cursor: not-allowed;
            background: rgba(239, 68, 68, 0.1);
        }

        .appointments-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .appointment-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .appointment-item:hover {
            border-color: var(--accent-primary);
            transform: translateX(5px);
        }

        .appointment-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .appointment-time {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .appointment-status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-confirmed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-pending {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .status-cancelled {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="appointments-container">
        <header style="margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 class="animated-gradient-text" style="font-size: 2.5rem; margin-bottom: 0.5rem;">
                        <i class="fa-solid fa-calendar-check"></i> Rendez-vous
                    </h1>
                    <p style="color: var(--text-muted);">Planifiez vos rencontres avec nos conseillers</p>
                </div>
                <a href="index.html" class="btn-secondary">
                    <i class="fa-solid fa-home"></i> Accueil
                </a>
            </div>
        </header>

        <div class="calendar-grid">
            <!-- Calendrier -->
            <div class="calendar-card">
                <div class="calendar-header">
                    <h3 style="font-size: 1.2rem; color: var(--text-main);">
                        <i class="fa-solid fa-calendar"></i> Sélectionner une date
                    </h3>
                    <div class="calendar-nav">
                        <button onclick="previousMonth()">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <span class="calendar-month" id="currentMonth"></span>
                        <button onclick="nextMonth()">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                </div>

                <div class="calendar-weekdays">
                    <div class="weekday">Lun</div>
                    <div class="weekday">Mar</div>
                    <div class="weekday">Mer</div>
                    <div class="weekday">Jeu</div>
                    <div class="weekday">Ven</div>
                    <div class="weekday">Sam</div>
                    <div class="weekday">Dim</div>
                </div>

                <div class="calendar-days" id="calendarDays"></div>

                <div style="margin-top: 2rem;">
                    <h4 style="color: var(--text-main); margin-bottom: 1rem;">
                        <i class="fa-solid fa-clock"></i> Créneaux disponibles
                    </h4>
                    <div class="time-slots" id="timeSlots">
                        <div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 2rem;">
                            Sélectionnez une date pour voir les créneaux disponibles
                        </div>
                    </div>
                </div>
            </div>

            <!-- Liste des RDV -->
            <div class="calendar-card">
                <h3 style="font-size: 1.2rem; color: var(--text-main); margin-bottom: 1.5rem;">
                    <i class="fa-solid fa-list-check"></i> Mes rendez-vous
                </h3>
                <div class="appointments-list" id="appointmentsList">
                    <!-- Les RDV seront chargés ici -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de confirmation -->
    <div class="modal" id="appointmentModal">
        <div class="modal-content">
            <h3 style="color: var(--text-main); margin-bottom: 1.5rem;">
                <i class="fa-solid fa-calendar-plus"></i> Confirmer le rendez-vous
            </h3>
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-main);">Type de consultation</label>
                <select id="appointmentType" class="input-group" style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-main);">
                    <option value="orientation">Orientation professionnelle</option>
                    <option value="project">Accompagnement projet</option>
                    <option value="financing">Demande de financement</option>
                    <option value="training">Information formation</option>
                    <option value="other">Autre</option>
                </select>
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-main);">Motif (optionnel)</label>
                <textarea id="appointmentReason" rows="3" placeholder="Décrivez brièvement l'objet de votre rendez-vous..." style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-main); resize: none;"></textarea>
            </div>

            <div style="background: rgba(56, 189, 248, 0.1); padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem;">
                <div style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem;">Récapitulatif</div>
                <div style="color: var(--text-main); font-weight: 600;" id="modalSummary"></div>
            </div>

            <div style="display: flex; gap: 1rem;">
                <button class="btn-secondary" onclick="closeModal()" style="flex: 1;">
                    Annuler
                </button>
                <button class="btn-primary" onclick="confirmAppointment()" style="flex: 1;">
                    <i class="fa-solid fa-check"></i> Confirmer
                </button>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        let currentDate = new Date();
        let selectedDate = null;
        let selectedTime = null;
        let appointments = [];
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            loadAppointments();
            renderCalendar();
            renderAppointmentsList();
        });

        function loadAppointments() {
            appointments = JSON.parse(localStorage.getItem('appointments')) || [];
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('currentMonth').textContent = 
                currentDate.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const prevLastDay = new Date(year, month, 0);
            
            const firstDayIndex = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            const lastDayDate = lastDay.getDate();
            const prevLastDayDate = prevLastDay.getDate();

            const daysHTML = [];

            // Jours du mois précédent
            for (let i = firstDayIndex; i > 0; i--) {
                daysHTML.push(`<div class="calendar-day other-month">${prevLastDayDate - i + 1}</div>`);
            }

            // Jours du mois actuel
            const today = new Date();
            for (let i = 1; i <= lastDayDate; i++) {
                const date = new Date(year, month, i);
                const dateStr = date.toISOString().split('T')[0];
                const isToday = date.toDateString() === today.toDateString();
                const isSelected = selectedDate === dateStr;
                const hasAppointment = appointments.some(apt => apt.date === dateStr);
                
                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                if (hasAppointment) classes += ' has-appointment';

                daysHTML.push(`<div class="${classes}" onclick="selectDate('${dateStr}')">${i}</div>`);
            }

            // Jours du mois suivant
            const remainingDays = 42 - daysHTML.length;
            for (let i = 1; i <= remainingDays; i++) {
                daysHTML.push(`<div class="calendar-day other-month">${i}</div>`);
            }

            document.getElementById('calendarDays').innerHTML = daysHTML.join('');
        }

        function selectDate(dateStr) {
            selectedDate = dateStr;
            selectedTime = null;
            renderCalendar();
            renderTimeSlots();
        }

        function renderTimeSlots() {
            const slots = [
                '08:00', '08:30', '09:00', '09:30', '10:00', '10:30',
                '11:00', '11:30', '14:00', '14:30', '15:00', '15:30',
                '16:00', '16:30'
            ];

            const bookedSlots = appointments
                .filter(apt => apt.date === selectedDate)
                .map(apt => apt.time);

            const slotsHTML = slots.map(slot => {
                const isBooked = bookedSlots.includes(slot);
                const isSelected = selectedTime === slot;
                
                let classes = 'time-slot';
                if (isBooked) classes += ' booked';
                if (isSelected) classes += ' selected';

                return `
                    <div class="${classes}" onclick="${isBooked ? '' : `selectTime('${slot}')`}">
                        <i class="fa-solid fa-clock"></i> ${slot}
                        ${isBooked ? '<div style="font-size: 0.7rem; color: #ef4444; margin-top: 4px;">Réservé</div>' : ''}
                    </div>
                `;
            }).join('');

            document.getElementById('timeSlots').innerHTML = slotsHTML;
        }

        function selectTime(time) {
            selectedTime = time;
            renderTimeSlots();
            openModal();
        }

        function openModal() {
            const date = new Date(selectedDate);
            const dateFormatted = date.toLocaleDateString('fr-FR', { 
                weekday: 'long', 
                day: 'numeric', 
                month: 'long', 
                year: 'numeric' 
            });

            document.getElementById('modalSummary').innerHTML = `
                <i class="fa-solid fa-calendar"></i> ${dateFormatted}<br>
                <i class="fa-solid fa-clock"></i> ${selectedTime}
            `;

            document.getElementById('appointmentModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('appointmentModal').classList.remove('active');
            document.getElementById('appointmentType').value = 'orientation';
            document.getElementById('appointmentReason').value = '';
        }

        function confirmAppointment() {
            const type = document.getElementById('appointmentType').value;
            const reason = document.getElementById('appointmentReason').value;

            const appointment = {
                id: `apt_${Date.now()}`,
                userId: currentUser.email,
                userName: currentUser.name,
                date: selectedDate,
                time: selectedTime,
                type: type,
                reason: reason,
                status: 'pending',
                createdAt: Date.now()
            };

            appointments.push(appointment);
            localStorage.setItem('appointments', JSON.stringify(appointments));

            closeModal();
            renderCalendar();
            renderAppointmentsList();
            
            showToast('Rendez-vous confirmé avec succès!', 'success');
        }

        function renderAppointmentsList() {
            const userAppointments = appointments
                .filter(apt => apt.userId === currentUser.email)
                .sort((a, b) => new Date(a.date + ' ' + a.time) - new Date(b.date + ' ' + b.time));

            if (userAppointments.length === 0) {
                document.getElementById('appointmentsList').innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
                        <i class="fa-solid fa-calendar-xmark" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.3;"></i>
                        <p>Aucun rendez-vous planifié</p>
                    </div>
                `;
                return;
            }

            const html = userAppointments.map(apt => {
                const date = new Date(apt.date);
                const dateFormatted = date.toLocaleDateString('fr-FR', { 
                    day: 'numeric', 
                    month: 'short' 
                });

                const typeLabels = {
                    orientation: 'Orientation',
                    project: 'Projet',
                    financing: 'Financement',
                    training: 'Formation',
                    other: 'Autre'
                };

                return `
                    <div class="appointment-item">
                        <div class="appointment-header">
                            <div>
                                <div class="appointment-time">
                                    <i class="fa-solid fa-calendar"></i> ${dateFormatted} à ${apt.time}
                                </div>
                                <div style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.3rem;">
                                    ${typeLabels[apt.type]}
                                </div>
                            </div>
                            <span class="appointment-status status-${apt.status}">
                                ${apt.status === 'confirmed' ? 'Confirmé' : apt.status === 'pending' ? 'En attente' : 'Annulé'}
                            </span>
                        </div>
                        ${apt.reason ? `<div style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">${apt.reason}</div>` : ''}
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.85rem;" onclick="cancelAppointment('${apt.id}')">
                                <i class="fa-solid fa-times"></i> Annuler
                            </button>
                            <button class="btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.85rem;">
                                <i class="fa-solid fa-edit"></i> Modifier
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('appointmentsList').innerHTML = html;
        }

        function cancelAppointment(id) {
            if (!confirm('Êtes-vous sûr de vouloir annuler ce rendez-vous?')) return;

            const index = appointments.findIndex(apt => apt.id === id);
            if (index !== -1) {
                appointments[index].status = 'cancelled';
                localStorage.setItem('appointments', JSON.stringify(appointments));
                renderAppointmentsList();
                renderCalendar();
                showToast('Rendez-vous annulé', 'info');
            }
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function showToast(message, type) {
            // Utiliser la fonction du main.js si disponible
            if (window.showToast) {
                window.showToast(message, type);
            } else {
                alert(message);
            }
        }
    </script>
</body>
</html>
